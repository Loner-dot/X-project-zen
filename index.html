<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝗫-𝗣𝗥𝗢𝗝𝗘𝗖𝗧 | 𝗭𝗘𝗡</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { border: 1px solid #222; padding: 40px; border-radius: 15px; background: #080808; text-align: center; width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { letter-spacing: 3px; font-weight: 900; margin-bottom: 5px; }
        .sub { color: #666; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        input { background: #111; border: 1px solid #222; color: #fff; padding: 15px; margin: 25px 0 10px 0; width: 100%; border-radius: 8px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #555; }
        button { background: #fff; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 14px; }
        button:hover { background: #ddd; }
        #code { font-size: 2.2em; margin-top: 30px; color: #fff; font-family: 'Courier New', monospace; font-weight: bold; letter-spacing: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>𝗫-𝗣𝗥𝗢𝗝𝗘𝗖𝗧</h2>
        <div class="sub">𝗭𝗘𝗡 𝗦𝗘𝗦𝗦𝗜𝗢𝗡 𝗚𝗘𝗡𝗘𝗥𝗔𝗧𝗢𝗥</div>
        <input type="text" id="phone" placeholder="234XXXXXXXXXX">
        <button onclick="getPairing()">GENERATE CODE</button>
        <div id="code"></div>
    </div>

    <script>
        async function getPairing() {
            const phone = document.getElementById('phone').value.replace(/\D/g,'');
            const display = document.getElementById('code');
            if(!phone) return alert("Please enter your phone number!");
            
            display.style.color = "#555";
            display.innerText = "REQUESTING...";
            
            try {
                const response = await fetch(`/pair?phone=${phone}`);
                const data = await response.json();
                if(data.code) {
                    display.style.color = "#fff";
                    display.innerText = data.code;
                } else {
                    display.innerText = "ERROR";
                }
            } catch (e) {
                display.innerText = "OFFLINE";
            }
        }
    </script>
</body>
</html>
