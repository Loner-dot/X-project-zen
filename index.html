<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝗫-𝗣𝗥𝗢𝗝𝗘𝗖𝗧 | 𝗭𝗘𝗡</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { border: 1px solid #333; padding: 40px; border-radius: 10px; background: #0a0a0a; text-align: center; width: 320px; }
        h2 { color: #fff; letter-spacing: 2px; font-weight: 800; }
        span { color: #555; font-size: 12px; }
        input { background: #111; border: 1px solid #333; color: #fff; padding: 12px; margin: 20px 0; width: 100%; border-radius: 5px; box-sizing: border-box; outline: none; }
        button { background: #fff; color: #000; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; transition: 0.3s; }
        button:hover { background: #ccc; }
        #code { font-size: 2em; margin-top: 25px; color: #fff; font-family: monospace; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>𝗫-𝗣𝗥𝗢𝗝𝗘𝗖𝗧 | 𝗭𝗘𝗡</h2>
        <span>S E S S I O𝐍  G E N E R A T O R</span>
        <input type="text" id="phone" placeholder="e.g. 2348000000000">
        <button onclick="getPairing()">GET PAIRING CODE</button>
        <div id="code"></div>
    </div>

    <script>
        async function getPairing() {
            const phone = document.getElementById('phone').value.replace(/\D/g,'');
            const display = document.getElementById('code');
            if(!phone) return alert("Enter number!");
            display.innerText = "LINKING...";
            
            try {
                const response = await fetch(`/pair?phone=${phone}`);
                const data = await response.json();
                display.innerText = data.code || "FAILED";
            } catch (e) {
                display.innerText = "ERROR";
            }
        }
    </script>
</body>
</html>
